<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Split Tip Calculator — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">💸</span>
                <div class="title-col">
                    <h1>Apex Split Tip Calculator</h1>
                    <p class="tagline">Quick splitter adding tips and shares from aggregate bills.</p>
                </div>
            </div>
            <div class="badge">calculators</div>
        </header>

        <main class="workspace-card">
            
            <input type="number" id="tip-bill" placeholder="Total Bill ($)" style="width:100%; margin-bottom:8px;">
            <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                <input type="number" id="tip-pct" value="15" placeholder="Tip %">
                <input type="number" id="tip-people" value="2" placeholder="People">
            </div>
            <button class="btn" onclick="calcTip()">Split Bill</button>
            <div id="tip-res" style="margin-top: 16px; font-size: 18px; color: var(--accent);"></div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
